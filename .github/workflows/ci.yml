name: CI

# Sanity check for the PITO screensavers: every shell script must parse and be
# shellcheck-clean, and every variant must reference a real art file + a real
# tte effect. Mirrors `bin/check`, with shellcheck + tte installed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install TerminalTextEffects
        run: pipx install terminaltexteffects

      - name: Run sanity check
        run: ./bin/check
